<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YesAgain — QC Records</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>

  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-.1px}
  header{background:var(--navy);color:#fff;padding:14px 26px;border-bottom:4px solid var(--orange);
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
  header .logo{font-size:22px;font-weight:800}header .logo span{color:var(--orange)}
  header h1{font-size:14px;font-weight:500;color:#b9c6dc;margin:0}header .sp{flex:1}

  .lookup input{flex:1;min-width:260px;max-width:520px;padding:11px 14px;border:0;border-radius:9px;font-size:15px;font-family:ui-monospace,Menlo,monospace}
  .lookup label{color:#cdd8ea;font-weight:700;font-size:13px}
  .lookup button{background:#fff;color:var(--navy);border:0;border-radius:9px;padding:10px 16px;font-weight:700;cursor:pointer}
  .tabs{display:flex;gap:8px;padding:14px 26px 0;max-width:1500px;margin:0 auto}
  .tab{padding:9px 18px;border-radius:9px 9px 0 0;background:#e7ecf3;color:var(--navy);font-weight:700;cursor:pointer;border:1px solid var(--line);border-bottom:0}
  .tab.on{background:var(--panel);color:var(--orange)}
  .wrap{max-width:100%;margin:0;padding:10px 14px 40px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .n{font-size:26px;font-weight:800;color:var(--navy);line-height:1.1}.stat .l{font-size:12px;color:var(--muted);margin-top:3px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .controls input,.controls select{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff}
  .controls input[type=search]{min-width:240px;flex:1}
  #colsBtn{padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:13px;cursor:pointer}
  #colMgr{display:none;position:absolute;right:0;top:42px;z-index:30;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.18);padding:10px;max-height:62vh;overflow:auto;width:230px}
  #colMgr.show{display:block}
  #colMgr .hd{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  #colMgr .ci{display:flex;align-items:center;gap:8px;padding:6px 7px;border-radius:6px;cursor:grab;font-size:13px;border-top:2px solid transparent}
  #colMgr .ci:hover{background:#f4f6fa}#colMgr .ci.dragover{border-top:2px solid var(--orange)}
  #colMgr .gw{cursor:grab;color:var(--muted)}
  #bulkBtn{background:#fff;color:var(--navy);border:0;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer}
  #bulkMenu{display:none;position:absolute;right:0;top:46px;z-index:30;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.18);padding:6px;width:240px}
  #bulkMenu.show{display:block}
  #bulkMenu .bm-hd{font-size:11px;color:var(--muted);padding:6px 8px}
  #bulkMenu .bm-i{padding:9px 10px;border-radius:7px;cursor:pointer;font-size:14px;color:var(--navy)}
  #bulkMenu .bm-i:hover{background:#f4f6fa}
  .pill{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;display:inline-block;letter-spacing:.3px}
  .pill.PASS{background:#e4f6ec;color:var(--ok)}.pill.FAIL,.pill.REJECT{background:#fae3e3;color:var(--bad)}
  .pill.INCOMPLETE{background:#fbf0d8;color:var(--watch)}.pill.OTHER{background:#eef2f8;color:var(--muted)}
  .gr{font-weight:800}.gr.A{color:#1e9e57}.gr.B{color:#3b82c4}.gr.C{color:#c8881b}.gr.D{color:#cf3b3b}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{padding:9px 11px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #tbl{table-layout:fixed}
  #recordsTab{overflow-x:auto}
  #thead th{user-select:none}
  .rsz{position:absolute;right:0;top:0;width:7px;height:100%;cursor:col-resize;z-index:2}
  .rsz:hover{background:var(--orange)}
  th{background:#f0f3f8;color:var(--navy);font-size:11px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none}
  tbody tr{cursor:pointer}tbody tr:hover{background:#f7faff}
  .prbtn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;color:var(--navy);vertical-align:middle;padding:0}
  .prbtn:hover{background:var(--orange);border-color:var(--orange);color:var(--navy)}
  .prbtn svg{display:block}
  .hrow{border-top:1px solid var(--line)}
  .hsum{display:flex;align-items:center;gap:10px;padding:7px 6px;cursor:pointer;font-size:13px}
  .hsum:hover{background:#f7faff}
  .hcar{color:var(--muted);transition:transform .15s;display:inline-block}

  .bar .track{flex:1;background:#eef2f8;border-radius:6px;height:18px;overflow:hidden}
  .bar .fill{height:100%;border-radius:6px;background:var(--navy)}
  .bar .v{width:54px;flex:none;text-align:right;font-weight:700;color:var(--navy)}
  .days{display:flex;align-items:flex-end;gap:3px;height:90px}
  .days .d{flex:1;background:var(--orange);border-radius:3px 3px 0 0;min-height:2px}
  .days .dl{display:flex;gap:3px;font-size:9px;color:var(--muted);margin-top:4px}
  .modal{position:fixed;inset:0;background:rgba(10,20,40,.55);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:30px;overflow:auto}
  .modal.show{display:flex}
  .card{background:#fff;border-radius:14px;max-width:780px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .card .top{background:var(--navy);color:#fff;padding:16px 22px;border-radius:14px 14px 0 0;display:flex;align-items:center;gap:12px}
  .card .top .x{margin-left:auto;cursor:pointer;font-size:22px;color:#cdd8ea}

  .card .body{padding:18px 22px}
  .kv{display:grid;grid-template-columns:170px 1fr;gap:6px 14px;font-size:13px}.kv dt{color:var(--muted)}.kv dd{margin:0;font-weight:600}
  .sec{font-size:12px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;margin:16px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
  .err{background:#fae3e3;color:var(--bad);padding:12px 16px;border-radius:8px;margin-bottom:14px;font-size:13px;display:none}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:20px}
  /* label print */
  #labelArea{position:absolute;left:-9999px;top:0}
  .label{width:88mm;padding:1.5mm 2mm;font-family:-apple-system,Arial,sans-serif;color:#000;display:flex;flex-direction:column;overflow:hidden;box-sizing:border-box}
  .label .lh{display:flex;align-items:center;gap:6px;border-bottom:1.5px solid #000;padding-bottom:2px;margin-bottom:2px}
  .label .lh .res{font-size:12pt;font-weight:900}.label .lh .gr{font-size:8.5pt;font-weight:800;border:1.5px solid #000;border-radius:4px;padding:0 5px;margin-left:auto}
  .label .lm{font-size:7.5pt;font-weight:700}.label .ls{font-family:ui-monospace,Menlo,monospace;font-size:10.5pt;font-weight:700;letter-spacing:.5pt}
  .label .lg{font-size:6.5pt;line-height:1.3;margin-top:1px}.label .lf{font-size:7pt;font-weight:800;line-height:1.3;margin-top:2px;white-space:normal}
  .label .lbc{margin-top:auto;text-align:center;padding:0 5mm}.label .lbc svg{width:100%;height:58px;display:block}.label .lbc .sn{font-family:ui-monospace,Menlo,monospace;font-size:9pt;margin-top:1px}
  @media print{ body>*{display:none!important} #labelArea{display:block!important;position:static}
    #labelArea .label{page-break-after:always;border:0} #labelArea .label:last-child{page-break-after:auto} @page{margin:1.5mm} }
  #login{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:100}
  #login .box{background:#fff;border-radius:16px;padding:30px 32px;width:330px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  #login .lg{font-size:26px;font-weight:800;color:var(--navy)}#login .lg span{color:var(--orange)}
  #login h2{font-size:16px;margin:6px 0 2px;color:var(--navy)}#login .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  #login select,#login input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;margin:6px 0;font-size:15px}
  #login button{width:100%;background:var(--orange);color:var(--navy);border:0;border-radius:10px;padding:13px;font-weight:800;cursor:pointer;margin-top:10px}
  #login .err{color:var(--bad);font-size:13px;min-height:18px;margin-top:10px}
  #who{color:#cdd8ea;font-size:13px}
  /* --- 2026 refresh: tidier surfaces + fonts --- */
  .mono,td.mono,.lookup input,.label .ls,.label .lbc .sn{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace}
  header .logo{letter-spacing:-.6px;font-weight:800}
  .stat,.chart{box-shadow:0 1px 2px rgba(17,39,71,.05)}
  .stat{border-radius:14px}.stat .n{font-weight:700}
  .tabs{gap:6px}
  .tab{background:transparent;border:0;border-bottom:2px solid transparent;border-radius:0;color:var(--muted);padding:10px 14px;font-weight:600;transition:color .12s,border-color .12s}
  .tab:hover{color:var(--navy)}
  .tab.on{background:transparent;color:var(--navy);border-bottom:2px solid var(--orange)}
  .chart h3{font-size:12px;font-weight:700}
  th{font-weight:700}
  .bar .lab{font-weight:500}
  /* --- lot report + supplier/lot/model analysis --- */
  .lotbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(17,39,71,.05)}
  .lotbar select{padding:10px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;min-width:230px;background:#fff;font-weight:600;font-family:'JetBrains Mono',ui-monospace,monospace;color:var(--navy)}
  .chip{font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;background:#eef2f8;color:var(--navy);white-space:nowrap}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap}
  .btn{background:var(--navy);color:#fff;border:0;border-radius:9px;padding:9px 14px;font-weight:600;cursor:pointer;font-size:13px}
  .btn:hover{filter:brightness(1.12)}
  .btn.orange{background:var(--orange);color:var(--navy);font-weight:700}
  .lr-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:10px;margin:0 0 16px}
  .lr-stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:0 1px 2px rgba(17,39,71,.05)}
  .lr-stat .n{font-size:23px;font-weight:700;color:var(--navy);line-height:1.05}.lr-stat .l{font-size:11px;color:var(--muted);margin-top:3px}
  .lr-stat.bad .n{color:var(--bad)}.lr-stat.ok .n{color:var(--ok)}
  .report{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(17,39,71,.05)}
  .report .rhd{background:var(--navy);color:#fff;padding:14px 18px;border-bottom:3px solid var(--orange)}
  .report .rhd .t{font-size:16px;font-weight:700}.report .rhd .s{font-size:12px;color:#b9c6dc;margin-top:2px}
  .report table{border:0;border-radius:0}
  .matrix{width:100%;border-collapse:collapse;font-size:12px;min-width:520px}
  .matrix th,.matrix td{border:1px solid var(--line);padding:6px 9px;text-align:center}
  .matrix th{background:#f0f3f8;color:var(--navy);font-size:10px}
  .matrix th:first-child,.matrix td:first-child{text-align:left;font-weight:600;white-space:nowrap}
  .matrix td.warm{background:#fdf0db}.matrix td.hot{background:#fae3e3;color:var(--bad);font-weight:800}
</style>
<style id="pageStyle"></style>

<body>
<div id="login"><div class="box">
  <img src="logo_orange.png" alt="YesAgain" style="height:34px"><h2>QC Records</h2>
  <div class="sub">Sign in with your Yes Check account</div>
  <select id="luser"><option>Loading accounts…</option></select>

  <button id="lbtn">Sign in</button>

</div></div>
<header>
  <img src="logo_white.png" alt="YesAgain" style="height:24px;vertical-align:middle"><h1>Quality-Control Records</h1>
  <div class="sp"></div>
  <span id="who"></span>
  <button class="ghost" id="reload">↻ Refresh</button><button id="csv">⤓ Export to Excel (full)</button>

</header>
<div class="lookup">

  <input id="q" placeholder="Scan the device serial (handheld) or type — the table auto-filters to matches" autocomplete="off">
  <div style="position:relative"><button id="bulkBtn">☰ Bulk actions</button><div id="bulkMenu"></div></div>
</div>
<div class="tabs"><div class="tab on" data-t="records">Records</div><div class="tab" data-t="analysis">Analysis &amp; faults</div><div class="tab" data-t="lot">Lot report</div></div>

<div class="wrap">
  <div class="err" id="err"></div>
  <div id="recordsTab">
    <div class="stats" id="stats"></div>
    <div class="controls">
      <select id="fResult"><option value="">All results</option><option>PASS</option><option>FAIL</option><option>REJECT</option><option>INCOMPLETE</option></select>
      <select id="fGrade"><option value="">All grades</option><option>A</option><option>B</option><option>C</option><option>D</option></select>
      <select id="fTech"><option value="">All technicians</option></select>
      <select id="fWh"><option value="">All regions</option><option>UAE</option><option>France</option><option>UK</option></select>
      <label class="muted" style="font-size:13px;display:flex;align-items:center;gap:5px">📅<input type="date" id="dFrom" title="From date" style="padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px"> → <input type="date" id="dTo" title="To date" style="padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px"><button onclick="document.getElementById('dFrom').value='';document.getElementById('dTo').value='';render()" style="border:0;background:#eef2f8;border-radius:6px;padding:6px 8px;cursor:pointer;font-size:12px">✕</button></label>

      <label class="muted" style="font-size:13px;display:flex;align-items:center;gap:6px"><input type="checkbox" id="uniqSerial"> latest per serial (hide older re-tests)</label>

<div class="modal" id="modal"><div class="card">
  <div class="top"><b id="mTitle"></b>
    <select id="labelSize" onchange="localStorage.setItem('qcLabelSize',this.value)" title="Label size" style="margin-left:auto;border-radius:7px;padding:5px 8px;border:1px solid #34527a;background:#1c3a5e;color:#fff;font-size:12px"></select>
    <button onclick="printLabel()">🖨 Print label</button><span class="x" onclick="closeModal()">×</span></div>
  <div class="body" id="mBody"></div>
</div></div>
<div id="labelArea"></div>

<script>
const SUPA="https://qulzvyhcpphntzuwyrnz.supabase.co";
const KEY="sb_publishable_Cvk7Yshzceynd0jh9Znd6Q__Tearm51";
let RAW=[],ROWS=[],sortK="tested_at",sortDir=-1,CURRENT=null;
const TEST_MARKERS=["PUBKEY","VERIFY","E2E","DEMO","SAMPLE","TEST-"];
const isTest=r=>{const s=(r.serial||"").toUpperCase(),t=(r.technician||"").toLowerCase();
  return TEST_MARKERS.some(m=>s.includes(m))||["verify","test","demo","e2e bot",""].includes(t);};
function normResult(r){const v=(r||"").toUpperCase();
  if(v.includes("REJECT"))return"REJECT";if(v.includes("INCOMPLETE"))return"INCOMPLETE";
  if(v.startsWith("PASS"))return"PASS";if(v.startsWith("FAIL"))return"FAIL";return v?"OTHER":"";}
function num(v){if(v==null)return null;const n=parseInt(String(v).replace(/[^0-9-]/g,""),10);return isNaN(n)?null:n;}
// Failed checks are stored by their POSITIVE check-name (e.g. "Battery drain normal under
// load"), which reads like a pass. Map them to plain fault wording so the column shows only
// real faults, clearly worded. Unknown / actual marked defects (a real scratch) pass through.
const FAULT_MAP={
  "Boots to macOS / chip detected":"Won't boot / chip not detected","Battery drain normal under load":"Abnormal battery drain",
  "Battery ≥ 85% capacity & not Service-recommended":"Battery <85% / service-recommended","No battery swelling / case bulge (safety)":"Battery swelling / case bulge",
  "Fans spin / thermals OK":"Fan / thermal fault","RAM test passed":"RAM fault","No unusual noise / rattles":"Unusual noise / rattle",
  "SSD detected":"SSD not detected","SSD write speed acceptable":"SSD slow / failing","Display — no dead pixels / lines":"Display: dead pixels / lines",
  "True Tone / brightness range OK":"True Tone / brightness fault","All keys register":"Keyboard: key(s) not registering","Layout & language match":"Keyboard layout mismatch",
  "Keyboard backlight works":"Keyboard backlight fault","Touch Bar lights & responds":"Touch Bar fault","Trackpad gestures + click":"Trackpad fault",
  "Touch ID button works":"Touch ID fault","Wi-Fi connects":"Wi-Fi fault","Bluetooth pairs":"Bluetooth fault","All USB-C / Thunderbolt ports":"USB-C / port fault",
  "Speakers — L/R channels":"Speaker fault","Microphone records":"Microphone fault","FaceTime camera":"Camera fault","Light sensor responds":"Light sensor fault",
  "Hinge firm, lid aligned":"Hinge / lid loose or misaligned","Activation Lock OFF":"Activation Lock ON","Not MDM enrolled":"MDM enrolled","Not DEP-assigned":"DEP-assigned",
  "DEP clear (live check / post-erase)":"DEP not clear","Sleep / wake works":"Sleep / wake fault","No recurring kernel panics":"Kernel panic(s)"};
// ctx = {h: battery health %, cond: macOS battery condition} lets the battery capacity/condition
// check name resolve to its ACTUAL reason — capacity vs macOS "Service Recommended" — so a 100%
// battery never reads as "<85%".
function faultPhrase(f,ctx){
  f=String(f).trim().replace(/^Category:\s*/i,""); if(!f) return "";
  if(/Battery\s*≥?\s*85%?\s*capacity/i.test(f)||f==="Battery <85% / service-recommended"){
    if(ctx){
      if(ctx.h!=null&&ctx.h<85) return "Battery capacity <85%";
      if(ctx.cond&&/service|replace|fair|poor/i.test(ctx.cond)) return `Battery: macOS condition “${ctx.cond}”`;
      return "Battery: service-recommended (macOS)";
    }
  }
  return FAULT_MAP[f]||f;
}
function flat(r){const s=r.snapshot||{};
  const _bh=num(r.battery_health??s.battery_health), _bc=r.battery_condition||s.battery_condition||"";
  const faults=[...new Set(
    [r.failed_categories,s.fault1,s.fault2,s.fault3,s.fault4,s.fault5,s.fault6,r.screen_issues,r.defects]

const fmtDate=d=>{try{const x=new Date(d);return x.toLocaleDateString(undefined,{day:"2-digit",month:"short",year:"numeric"})+" "+x.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});}catch(e){return d||"—";}};
// Region-based tested time: show each unit in ITS OWN local time. The app stamps a
// station-local string (tested_local); if absent (older records), convert the UTC
// tested_at into the record's saved timezone, else the viewer's local time.
// Bucket a record into one of the 3 operating regions by its warehouse / timezone.
function regionGroup(r){
  const w=(r&&r.warehouse||"").toLowerCase(), tz=(r&&r.timezone||"").toLowerCase();
  if(/uae|dubai|abu ?dhabi|sharjah|ajman|muscat|emirat/.test(w)||/dubai|muscat|abu_dhabi/.test(tz)) return "UAE";
  if(/france|paris|fr\b/.test(w)||/paris/.test(tz)) return "France";
  if(/\buk\b|united kingdom|london|britain|england|scotland|wales/.test(w)||/london/.test(tz)) return "UK";
  return w||tz?"Other":"";
}
function fmtTested(r){
  const s=(r&&r.snapshot)||{};                       // works for flattened rows AND raw records
  const tl=(r&&r.tested_local)||s.tested_local; if(tl) return tl;
  const tz=(r&&r.timezone)||s.timezone;
  const d=(r&&r.tested_at)||r;
  try{const x=new Date(d);const o={day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"};
    if(tz){try{o.timeZone=tz;}catch(e){}}
    return x.toLocaleString(undefined,o).replace(",","");}catch(e){return fmtDate(d);}
}

function loadCols(){ORDER=ALLCOLS.map(c=>c.key);VIS=DEFAULT_VIS.slice();WIDTHS={};

function saveCols(){localStorage.setItem(colKey(),JSON.stringify({order:ORDER,visible:VIS,widths:WIDTHS}));}
function visCols(){return ORDER.filter(k=>VIS.includes(k)).map(k=>ALLCOLS.find(c=>c.key===k));}

function renderHead(){const cols=visCols();

async function load(){
  document.getElementById("err").style.display="none";
  try{
    const res=await fetch(`${SUPA}/rest/v1/audits?select=*&order=tested_at.desc&limit=10000`,{headers:{apikey:KEY,Authorization:"Bearer "+KEY}});
    if(!res.ok)throw new Error("HTTP "+res.status);
    RAW=(await res.json()).map(flat);fillTechs();render();
  }catch(e){const el=document.getElementById("err");el.style.display="block";
    el.textContent="Couldn't load records: "+e.message+". Check the connection and Refresh.";
    document.getElementById("rows").innerHTML='<tr><td colspan="12" class="empty">No data.</td></tr>';}
}
function fillTechs(){const techs=[...new Set(RAW.filter(r=>!isTest(r._raw)).map(r=>r.technician).filter(Boolean))].sort();
  document.getElementById("fTech").innerHTML='<option value="">All technicians</option>'+techs.map(t=>`<option>${t}</option>`).join("");
  // Fixed region groups (UAE/France/UK) + "Other" only if some record doesn't map to one.
  const groups=new Set(RAW.filter(r=>!isTest(r._raw)).map(r=>regionGroup(r)).filter(Boolean));
  const sel=document.getElementById("fWh"),keep=sel.value;
  let opts='<option value="">All regions</option>'+["UAE","France","UK"].map(g=>`<option>${g}</option>`).join("");
  if(groups.has("Other"))opts+='<option>Other</option>';
  sel.innerHTML=opts; sel.value=keep;}
function current(){
  const q=document.getElementById("q").value.toLowerCase().trim();
  const fr=document.getElementById("fResult").value,fg=document.getElementById("fGrade").value;
  const ft=document.getElementById("fTech").value,hide=document.getElementById("hideTest").checked;
  const fw=document.getElementById("fWh").value;
  const df=document.getElementById("dFrom").value,dt=document.getElementById("dTo").value;
  let rows=RAW.filter(r=>{
    if(hide&&isTest(r._raw))return false;
    if(fr&&r.result!==fr)return false;if(fg&&r.grade!==fg)return false;if(ft&&r.technician!==ft)return false;
    if(fw&&regionGroup(r)!==fw)return false;
    const d=(r.tested_at||"").slice(0,10);
    if(df&&d<df)return false;if(dt&&d>dt)return false;
    if(q){const hay=[r.serial,r.model,r.technician,r.lot_id,r.po,r.supplier,r.sku].join(" ").toLowerCase();if(!hay.includes(q))return false;}
    return true;});
  // Latest-per-serial: keep only the most recent test for each serial (hide older re-tests).
  if(document.getElementById("uniqSerial").checked){
    const m=new Map();
    for(const r of rows){const k=(r.serial||r.id).toUpperCase();const e=m.get(k);
      if(!e||(r.tested_at||"")>(e.tested_at||""))m.set(k,r);}
    rows=[...m.values()];}
  rows.sort((a,b)=>{let x=a[sortK]??"",y=b[sortK]??"";if(sortK==="batt"){x=a.batt_h??-1;y=b.batt_h??-1;}if(sortK==="storage"){x=a.storage??-1;y=b.storage??-1;}
    return(x>y?1:x<y?-1:0)*sortDir;});
  return rows;}
function render(){
  ROWS=current();const real=ROWS;
  const uniq=latestPerSerial(real);                       // unique units for the quality numbers
  const units=uniq.length;
  const pass=uniq.filter(r=>r.result==="PASS").length;
  const fail=uniq.filter(r=>r.result==="FAIL"||r.result==="REJECT").length;
  const wk=Date.now()-7*864e5,last7=real.filter(r=>{const t=Date.parse(r.tested_at);return t&&t>=wk;}).length;
  const passRate=uniq.length?Math.round(pass/uniq.length*100):0;
  document.getElementById("stats").innerHTML=[[real.length,"QC runs (filtered)"],[units,"distinct units"],[passRate+"%","pass rate (units)"],[fail,"fail / reject (units)"],[last7,"tests in last 7 days"]]
    .map(([n,l])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
  const cols=visCols(),tb=document.getElementById("rows");
  if(!ROWS.length)tb.innerHTML=`<tr><td colspan="${cols.length+1}" class="empty">No records match.</td></tr>`;
  else tb.innerHTML=ROWS.map((r,i)=>`<tr onclick="openModal(${i})"><td onclick="event.stopPropagation()" style="width:70px;white-space:nowrap;overflow:visible"><input type="checkbox" onchange="toggleSel('${r.id}',this.checked)" ${SEL.has(r.id)?"checked":""}> <button class="prbtn" onclick="printRow(event,'${r.id}')" title="Print this label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></button></td>`+cols.map(c=>c.html(r)).join("")+`</tr>`).join("");
  const sa=document.getElementById("selAll");if(sa)sa.checked=ROWS.length>0&&ROWS.every(r=>SEL.has(r.id));
  document.getElementById("foot").textContent=`${ROWS.length} record(s) · live from Supabase · ${new Date().toLocaleString()}`;
  renderAnalysis(real);
  if(document.getElementById("lotTab").style.display!=="none")renderLotReport();
}
function bars(map,color,limit){const ent=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,limit||99);
  const mx=Math.max(1,...ent.map(e=>e[1]));
  return ent.map(([k,v])=>`<div class="bar"><div class="lab" title="${k}">${k}</div><div class="track"><div class="fill" style="width:${Math.round(v/mx*100)}%;background:${color||'var(--navy)'}"></div></div><div class="v">${v}</div></div>`).join("")||'<div class="muted">No data.</div>';}
// Split a record's faults into clean, normalised fault names (drop the "(...)" detail).
function splitFaults(r){return (r.faults||"").split(";").map(f=>f.trim()).filter(Boolean)
  .map(f=>f.replace(/\s*\(.*?\)\s*/g,"").replace(/^Category:\s*/i,"").trim()).filter(Boolean);}
// A unit counts as defective if it failed/was rejected OR carries any recorded fault.
function isDefective(r){return r.result==="FAIL"||r.result==="REJECT"||!!(r.faults&&r.faults.trim());}
// Bars showing DEFECT RATE per key (map: key -> {total, fail}). Colour-coded by rate.
function rateBars(map){const ent=Object.entries(map).filter(([k])=>k&&k!=="—")
    .sort((a,b)=>(b[1].fail/b[1].total-a[1].fail/a[1].total)||(b[1].total-a[1].total)).slice(0,12);
  if(!ent.length)return '<div class="muted">No lot / supplier recorded on these units yet — add it at intake.</div>';
  return ent.map(([k,v])=>{const pct=Math.round(v.fail/v.total*100),col=pct>=20?'var(--bad)':pct>=10?'var(--watch)':'var(--ok)';
    return `<div class="bar"><div class="lab" title="${k}">${k}</div><div class="track"><div class="fill" style="width:${pct}%;background:${col}"></div></div><div class="v" style="width:auto;min-width:92px">${pct}% <span class="muted" style="font-weight:500">(${v.fail}/${v.total})</span></div></div>`;}).join("");}
function renderAnalysis(rows){
  const real=latestPerSerial(rows);          // UNIQUE UNITS only — latest test per serial, no re-test double-counting
  const byRes={},byGr={},byModel={},byTech={},faults={},bySup={},byLot={},modelFault={},faultTot={},modelDef={};
  real.forEach(r=>{byRes[r.result||"—"]=(byRes[r.result||"—"]||0)+1;
    byGr[r.grade||"—"]=(byGr[r.grade||"—"]||0)+1;
    if(r.model)byModel[r.model]=(byModel[r.model]||0)+1;
    if(r.technician)byTech[r.technician]=(byTech[r.technician]||0)+1;
    const def=isDefective(r)?1:0;
    if(def&&r.model)modelDef[r.model]=(modelDef[r.model]||0)+1;   // unique DEFECTIVE units of this model
    if(r.supplier){const s=bySup[r.supplier]=bySup[r.supplier]||{total:0,fail:0};s.total++;s.fail+=def;}
    if(r.lot_id){const s=byLot[r.lot_id]=byLot[r.lot_id]||{total:0,fail:0};s.total++;s.fail+=def;}
    splitFaults(r).forEach(f=>{faults[f]=(faults[f]||0)+1;faultTot[f]=(faultTot[f]||0)+1;
      if(r.model){(modelFault[r.model]=modelFault[r.model]||{})[f]=((modelFault[r.model]||{})[f]||0)+1;}});});
  // model × fault matrix — cells = unique units of that model with the fault; Total = unique defective units
  const topF=Object.entries(faultTot).sort((a,b)=>b[1]-a[1]).slice(0,6).map(e=>e[0]);
  const topM=Object.entries(modelDef).sort((a,b)=>b[1]-a[1]).slice(0,8).map(e=>e[0]);
  let matrix='<div class="muted">No model / fault data yet.</div>';
  if(topF.length&&topM.length){matrix=`<div style="overflow-x:auto"><table class="matrix"><tr><th>Model</th>${topF.map(f=>`<th title="${f}">${f}</th>`).join("")}<th>Defective units</th></tr>`+
    topM.map(m=>{const fs=modelFault[m]||{};
      return `<tr><td title="${m}">${m}</td>${topF.map(f=>{const c=fs[f]||0;return `<td class="${c>=3?'hot':c>0?'warm':''}">${c||""}</td>`;}).join("")}<td><b>${modelDef[m]||0}</b></td></tr>`;}).join("")+`</table></div>`;}
  const days={};for(let i=29;i>=0;i--){const d=new Date(Date.now()-i*864e5).toISOString().slice(0,10);days[d]=0;}
  rows.forEach(r=>{const d=(r.tested_at||"").slice(0,10);if(d in days)days[d]++;});   // throughput = actual test events
  const dv=Object.values(days),dmx=Math.max(1,...dv);
  const resColor={PASS:'var(--ok)',FAIL:'var(--bad)',REJECT:'var(--bad)',INCOMPLETE:'var(--watch)'};
  const resBars=Object.entries(byRes).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{const mx=Math.max(1,...Object.values(byRes));
    return `<div class="bar"><div class="lab"><span class="pill ${k}">${k}</span></div><div class="track"><div class="fill" style="width:${Math.round(v/mx*100)}%;background:${resColor[k]||'var(--muted)'}"></div></div><div class="v">${v}</div></div>`;}).join("");
  document.getElementById("analysisTab").innerHTML=`
    <div class="muted" style="font-size:12px;margin:2px 2px 12px">Every figure below counts <b>unique units</b> (latest test per serial) — re-tests are never double-counted. “Tests per day” is the only chart that counts actual test events.</div>
    <div class="grid2">
      <div class="chart"><h3>⚠️ Top faults — defect analysis</h3>${bars(faults,'var(--bad)',14)}</div>
      <div class="chart"><h3>Defect rate by supplier</h3>${rateBars(bySup)}</div>
      <div class="chart"><h3>Defect rate by lot</h3>${rateBars(byLot)}</div>
      <div class="chart"><h3>Result breakdown</h3>${resBars||'<div class="muted">No data.</div>'}</div>
      <div class="chart" style="grid-column:1/-1"><h3>Faults by model — unique units (top 8 models × top 6 faults)</h3>${matrix}</div>
      <div class="chart"><h3>Grade distribution</h3>${bars(byGr,'var(--blue)',8)}</div>
      <div class="chart"><h3>By model — volume</h3>${bars(byModel,'var(--navy2)',12)}</div>
      <div class="chart"><h3>By technician</h3>${bars(byTech,'var(--navy)',12)}</div>
      <div class="chart"><h3>Tests per day — last 30 days</h3>
        <div class="days">${dv.map(v=>`<div class="d" title="${v}" style="height:${Math.round(v/dmx*100)}%"></div>`).join("")}</div>
        <div class="muted" style="font-size:11px;margin-top:6px">${Object.keys(days)[0].slice(5)} → today · peak ${dmx}/day</div>
      </div>
    </div>`;

      while(el.offsetWidth>max&&fs>4&&g++<40){fs-=0.3;el.style.fontSize=fs+"px";}});
    // A too-long SKU shrinks to fit ONE line (never wraps/pushes the rest of the label off).
    idoc.querySelectorAll(".lsku").forEach(el=>{let fs=parseFloat(iwin.getComputedStyle(el).fontSize)||7.5,g=0;
      while(el.scrollWidth>el.clientWidth+1&&fs>4.5&&g++<40){fs-=0.3;el.style.fontSize=fs+"px";}});
    iwin.focus();iwin.print();
  }catch(e){alert("Print failed: "+e.message);}},300);}
function printLabel(){if(CURRENT)printLabels([CURRENT]);}
function printRow(e,id){e.stopPropagation();const r=ROWS.find(x=>x.id===id)||RAW.find(x=>x.id===id);if(r)printLabels([r]);}
// Full QC history for one unit (all prior tests on the same serial).
function histDetailHTML(x){const row=(k,v)=>v?`<dt>${k}</dt><dd>${v}</dd>`:"";
  return `<dl class="kv" style="font-size:12px">
    ${row("Result",x.result_raw||x.result)}${row("Grade",`${x.grade||"—"} (LCD ${x.display_grade||"—"} / Body ${x.body_grade||"—"})`)}
    ${row("Battery",x.batt_h!=null?Math.min(100,x.batt_h)+"% · "+(x.batt_c??"?")+" cyc"+(x.batt_cond?" · "+x.batt_cond:""):"")}
    ${row("Storage",x.storage?x.storage+" GB":"")}${row("Performance",x.perf_score)}${row("Department",x.department)}
    ${row("Faults",x.faults?`<span style="color:var(--bad)">${x.faults}</span>`:"none")}
    ${row("Notes",x.notes)}</dl>`;}
function historyHTML(r){
  const h=RAW.filter(x=>x.serial&&r.serial&&x.serial.toUpperCase()===r.serial.toUpperCase())
    .sort((a,b)=>(b.tested_at||"")>(a.tested_at||"")?1:-1);
  if(h.length<=1)return `<div class="sec">History</div><div class="muted" style="font-size:13px">Only this one QC test is on record for this serial.</div>`;
  return `<div class="sec">History — ${h.length} tests on this unit <span class="muted" style="font-weight:400;text-transform:none">(click a row to expand)</span></div>`+
    h.map(x=>`<div class="hrow${x.id===r.id?" open":""}">
      <div class="hsum" onclick="this.parentElement.classList.toggle('open')">
        <span class="hcar">▸</span>
        <span style="min-width:150px">${fmtTested(x)}</span>
        <span class="pill ${x.result||'OTHER'}">${x.result||'—'}</span>
        <span class="gr ${x.grade}" style="min-width:18px">${x.grade||'—'}</span>
        <span style="flex:1;min-width:80px">${x.technician||'—'}</span>
        <span style="color:var(--bad);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.faults||''}</span>
      </div>
      <div class="hdet">${histDetailHTML(x)}</div>
    </div>`).join("");}

// ---- bulk actions (operate on selected rows, or all filtered rows if none selected) ----
const SEL=new Set();                                  // selected record ids
function selRows(){const s=ROWS.filter(r=>SEL.has(r.id));return s.length?s:ROWS;}
function toggleSel(id,on){on?SEL.add(id):SEL.delete(id);}
function bulkLabels(){const rows=selRows();if(rows.length>60&&!confirm(`Print ${rows.length} labels?`))return;printLabels(rows);}
function bulkExport(){const rows=selRows();const keep=ROWS;ROWS=rows;csv();ROWS=keep;}
function renderBulkMenu(){const n=SEL.size,t=n||ROWS.length,lbl=n?`${n} selected`:`all ${ROWS.length} shown`;
  document.getElementById("bulkMenu").innerHTML=
    `<div class="bm-hd">Acts on ${lbl}</div>
     <div class="bm-i" onclick="bulkLabels();closeBulk()">🖨 Print labels (${t})</div>
     <div class="bm-i" onclick="bulkExport();closeBulk()">⤓ Export to Excel (${t})</div>
     ${n?`<div class="bm-i" onclick="SEL.clear();render();renderBulkMenu()">✕ Clear selection</div>`:""}`;}
function closeBulk(){document.getElementById("bulkMenu").classList.remove("show");}

function csv(){
  // FULL detail export — [field, Excel header]. Covers SKU, RAM, colour, keyboard,
  // LCD/body grade, CPU+speed, and Apple-Silicon CPU/GPU core counts.
  const COLS=[["tested_at","Tested"],["serial","Serial"],["model","Model"],["year","Year"],
    ["chip","CPU / Chip"],["cpu_speed","CPU speed"],["cpu_cores","CPU cores"],["gpu_cores","GPU cores"],
    ["memory","RAM (GB)"],["storage","SSD (GB)"],["colour","Colour"],["sku","YesAgain SKU"],["part_number","Part number"],
    ["grade","Overall grade"],["display_grade","LCD / Display grade"],["body_grade","Body grade"],["result","Result"],
    ["batt_h","Battery health %"],["batt_c","Battery cycles"],["batt_cond","Battery condition"],
    ["kbd_layout","Keyboard layout"],["kbd_language","Keyboard language"],["wifi","Wi-Fi SSID"],
    ["perf_score","Performance"],["photos","Photos"],["technician","Technician"],["technician_username","Tech username"],["warehouse","Warehouse"],["timezone","Timezone"],["department","Department"],
    ["lot_id","Lot"],["po","PO"],["supplier","Supplier"],["faults","Faults"],["notes","Notes"]];
  const esc=v=>`"${String(v??"").replace(/"/g,'""')}"`;
  const val=(k,r)=>k==="batt_h"&&r.batt_h!=null?Math.min(100,r.batt_h):r[k];
  const lines=[COLS.map(c=>esc(c[1])).join(",")].concat(ROWS.map(r=>COLS.map(c=>esc(val(c[0],r))).join(",")));
  // UTF-8 BOM + CRLF so Excel opens it cleanly (incl. Arabic notes)
  const blob=new Blob(["﻿"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download=`YesAgain QC Records ${new Date().toISOString().slice(0,10)}.csv`;a.click();}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));t.classList.add("on");
  const v=t.dataset.t;
  document.getElementById("recordsTab").style.display=v==="records"?"block":"none";
  document.getElementById("analysisTab").style.display=v==="analysis"?"block":"none";
  document.getElementById("lotTab").style.display=v==="lot"?"block":"none";
  if(v==="lot")renderLotReport();});
loadCols();renderHead();
document.getElementById("colsBtn").onclick=e=>{e.stopPropagation();const m=document.getElementById("colMgr");const show=!m.classList.contains("show");m.classList.toggle("show",show);if(show)renderColMgr();};
document.addEventListener("click",e=>{if(!e.target.closest("#colMgr")&&e.target.id!=="colsBtn")document.getElementById("colMgr").classList.remove("show");});
["q","fResult","fGrade","fTech","fWh","hideTest","uniqSerial","dFrom","dTo"].forEach(id=>document.getElementById(id).addEventListener("input",render));
document.getElementById("reload").onclick=load;document.getElementById("csv").onclick=csv;

// ---- login gate (same Yes Check accounts via app_login) ---------------------
async function rpc(fn,args){const r=await fetch(`${SUPA}/rest/v1/rpc/${fn}`,{method:"POST",
  headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"},body:JSON.stringify(args||{})});
  return r.ok?r.json():null;}
async function fillLoginUsers(){const u=await rpc("app_login_users",{});
  if(u&&u.length)document.getElementById("luser").innerHTML=u.map(x=>`<option value="${x.username}">${x.display_name||x.username}</option>`).join("");
  else document.getElementById("luser").innerHTML='<option value="">No accounts found</option>';}
async function doLogin(){const u=document.getElementById("luser").value,p=document.getElementById("lpin").value;
  const e=document.getElementById("lerr");if(!u){e.textContent="No account selected.";return;}e.textContent="Signing in…";
  const j=await rpc("app_login",{p_username:u,p_pin:p});
  if(j&&j.ok){sessionStorage.setItem("qcUser",j.display_name||u);enter();}
  else e.textContent=(j&&j.reason)||"Sign-in failed.";}
function enter(){document.getElementById("login").style.display="none";
  document.getElementById("who").textContent="Signed in: "+(sessionStorage.getItem("qcUser")||"");
  loadCols();renderHead();load();                   // per-login column layout
  document.getElementById("q").focus();}            // focus the scan/search box for the handheld scanner
document.getElementById("bulkBtn").onclick=e=>{e.stopPropagation();const m=document.getElementById("bulkMenu");
  const show=!m.classList.contains("show");m.classList.toggle("show",show);if(show)renderBulkMenu();};
document.addEventListener("click",e=>{if(!e.target.closest("#bulkMenu")&&e.target.id!=="bulkBtn")closeBulk();});
function requireLogin(){if(sessionStorage.getItem("qcUser"))enter();
  else{fillLoginUsers();document.getElementById("login").style.display="flex";}}
document.getElementById("lbtn").onclick=doLogin;
document.getElementById("lpin").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
document.getElementById("logout").onclick=()=>{sessionStorage.removeItem("qcUser");location.reload();};
requireLogin();
</script>
